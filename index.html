/* NAVBAR */
nav {
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(0,0,0,0.6);

}

nav h2 { margin:0; }

nav a {

}

/* HERO */
.hero {
  height:100vh;
  background:
  linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)),
  url('https://images.unsplash.com/photo-1521336575822-6da63fb45455') center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#fff;
  text-align:center;
}

.hero h1 {
  font-size:55px;
  margin:0;
}

.hero p {
  margin-top:10px;
  font-size:18px;
}

.btn {
  margin-top:25px;
  padding:14px 35px;
  background:#fff;
  color:#000;
  border-radius:30px;
  text-decoration:none;
  font-weight:500;
  transition:0.3s;
}

.btn:hover {
  background:#000;
  color:#fff;
}

/* SECTION */
.section {
  padding:80px 20px;
  text-align:center;
}

.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card {
  width:300px;
  border-radius:15px;
  overflow:hidden;
  transition:0.4s;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card:hover {
  transform:translateY(-10px);
}

.card img {
  width:100%;
  height:350px;
  object-fit:cover;
}

.card h3 {
  padding:15px;
}

/* DARK SECTION */
.dark {
  background:#111;
  color:#fff;
}

/* FOOTER */
footer {
  background:#000;
  color:#fff;
  text-align:center;
  padding:20px;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:15px;
  border-radius:50%;
  font-size:22px;
  text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero h1 { font-size:35px; }
}
</style>
